<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Chart bars -->
  <rect x="14" y="36" width="5" height="12" rx="2" fill="#FFFFFF" opacity="0.25"/>
  <rect x="24" y="30" width="5" height="18" rx="2" fill="#FFFFFF" opacity="0.35"/>
  <rect x="34" y="24" width="5" height="24" rx="2" fill="#FFFFFF" opacity="0.45"/>

  <!-- Rising trend line -->
  <path
    d="M14 42 L28 32 L38 36 L50 20"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow head -->
  <path
    d="M44 20 H50 V26"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>